name: Zappy CI/CD Pipeline
run-name: Pipeline execution flow (${{ github.run_id }})
on: push

jobs:
  check-coding-style:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/epitech/coding-style-checker
    steps:
      - name: Checkout the project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Launch the coding style checker
        run: check.sh $(pwd) $(pwd)
      - name: Extract and generate a viewable report
        run: |
          REPORTS_FILE="coding-style-reports.log"

          while read line; do
              offending_file="$(echo "$line" | cut -d':' -f1 | cut -c 3-)"
              offending_line="$(echo "$line" | cut -d':' -f2)"
              error_level="$(echo "$line" | cut -d':' -f3 | cut -c 2-)"
              error_type="$(echo "$line" | cut -d':' -f4)"
              
              echo "::error file=$offending_file,line=$offending_line,title=$error_level coding style error::$error_type"
          done < "$REPORTS_FILE"

  compile:
    needs: check-coding-style
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout the project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Initialize and setup the container
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel gcc git \
            \
            cmake make \
            \
            glfw sdl2 sdl2_gfx sdl2_image sdl2_mixer sdl2_net sdl2_ttf libxrandr libxinerama libxi
      - name: Generate the build files with CMake
        run: cmake -B build -S .
      - name: Build the project with CMake
        run: cmake --build build --config Release
      - name: Check if the binaries are present
        run: |
          EXECUTABLES_FILES="zappy_ai zappy_gui zappy_server"

          for executable in $EXECUTABLES_FILES; do
              if [[ ! -f "$executable" ]] || [[ ! -x "$executable" ]]; then
                  echo "::error file=$executable::'$executable' binary file is missing"
              fi
          done
